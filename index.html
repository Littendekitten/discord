<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Crystal Cats | Littendekitten</title>
    
    <!-- Favicon Link -->
    <link rel="icon" type="image/jpeg" href="favicon.jpg">

    <style>
        /* Neon Purple/Pink Dark Gaming Theme */
        body {
            background-color: #0b0b10;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        /* Profile picture styling */
        .logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #d946ef;
            box-shadow: 0 0 20px rgba(217, 70, 239, 0.6);
            object-fit: cover;
            margin-bottom: 15px;
        }

        h1 {
            margin: 5px 0;
            font-size: 26px;
            font-weight: bold;
            background: linear-gradient(45deg, #ff00ff, #7000ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h2 {
            margin: 0 0 30px 0;
            font-size: 16px;
            color: #a0a0c0;
            font-weight: normal;
        }

        /* General Button Styling */
        .btn {
            display: block;
            background: #161622;
            color: #ffffff;
            text-decoration: none;
            padding: 16px;
            margin: 14px 0;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.25s ease;
            border: 1px solid #2d2d3f;
        }

        .btn:hover {
            transform: translateY(-3px);
        }

        /* Discord Button Styling */
        .btn-discord {
            background: #5865F2;
            border-color: #5865F2;
            box-shadow: 0 0 15px rgba(88, 101, 242, 0.4);
        }

        .btn-discord:hover {
            background: #4752c4;
            box-shadow: 0 0 20px rgba(88, 101, 242, 0.7);
        }

        /* YouTube Button Styling */
        .btn-youtube {
            border-color: #ef4444;
        }

        .btn-youtube:hover {
            background: #ef4444;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.6);
        }

        /* Twitch Button Styling */
        .btn-twitch {
            border-color: #a855f7;
        }

        .btn-twitch:hover {
            background: #a855f7;
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.6);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Your Server Logo (Updated to .png) -->
        <img class="logo" src="logo.png" alt="Crystal Cats Logo">
        
        <h1>Littendekitten</h1>
        <h2>Welcome to the Crystal Cats Hub</h2>
        
        <!-- Navigation Links -->
        <a href="https://discord.gg/KhHpGkaBtk" target="_blank" class="btn btn-discord">Join Discord Server</a>
        <a href="https://www.youtube.com/@Littendekitten" target="_blank" class="btn btn-youtube">YouTube Channel</a>
        <a href="https://twitch.tv/littendekitten" target="_blank" class="btn btn-twitch">Twitch Stream</a>
    </div>

</body>
</html>
